id: sre-agent-03
title: Onboard Service Context and Response Plans
module: sre-agent
track: azure-sre-agent
difficulty: intermediate
duration_minutes: 45
prerequisites:
  - sre-agent-01
prerequisite_capabilities:
  - Azure SRE Agent portal access
  - Deployed or simulated Grubify lab
  - Azure monitoring basics
description: Teach Azure SRE Agent what it is responsible for by reviewing connected Azure resources, knowledge files, runbooks, custom agents, response plans, and team memory.
success_criteria:
  - The team verifies connected Azure resources, incidents, knowledge files, and optional code.
  - The agent can summarize the Grubify architecture and HTTP error runbook.
  - The team identifies the incident-handler, code-analyzer, and issue-triager roles when available.
  - A response plan or fallback response-plan summary explains how alerts reach the agent.
  - Team memory captures on-call ownership and escalation without secrets.
take_home_action: In your own Azure subscription and GitHub org, attach the service runbooks, response plans, escalation ownership, and source context Azure SRE Agent needs for one real workload.
take_home_owner: solution-architect
take_home_signal: The agent summarizes the real workload architecture, runbook path, escalation owner, and incident routing plan without exposing secrets.
tags:
  - azure-sre-agent
  - response-plans
  - runbooks
  - memory
app_dependency: grubify-starter-lab
emu_compatible: true
min_environment: org
tier: core
source_repo: microsoft/sre-agent
source_path: labs/starter-lab/README.md
license: MIT
references:
  - https://sre.azure.com/docs/concepts/memory
  - https://sre.azure.com/docs/concepts/subagents
  - https://sre.azure.com/docs/capabilities/incident-response-plans
  - https://github.com/microsoft/sre-agent/tree/main/labs/starter-lab
