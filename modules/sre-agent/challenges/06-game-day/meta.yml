id: sre-agent-06
title: Run the Azure SRE Agent Game Day
module: sre-agent
track: azure-sre-agent
difficulty: advanced
duration_minutes: 75
prerequisites:
  - sre-agent-05
prerequisite_capabilities:
  - Azure SRE Agent portal access
  - Connected or simulated Grubify observability and source-code context
  - Basic incident-response practice
description: Run an end-to-end game day from controlled failure to Azure SRE Agent investigation, evidence-backed remediation, GitHub follow-up, recovery proof, and post-incident improvement.
success_criteria:
  - The incident timeline starts with user impact and Azure alert evidence.
  - Azure SRE Agent output is cited as investigation evidence, not accepted as proof without validation.
  - The response connects Azure signals, runbook knowledge, source context, and remediation work.
  - Recovery is proven with endpoint, browser, metric, or alert-resolution evidence.
  - A customer-safe incident summary avoids secrets and unsupported claims.
  - The team creates one improvement to monitoring, runbooks, source context, response plans, hooks, or approval policy.
  - 'Coach conversation — after this game day, what would you change before allowing Azure SRE Agent to run autonomously on a real production service?'
tags:
  - sre-agent
  - game-day
  - remediation
  - post-incident-review
app_dependency: grubify-starter-lab
emu_compatible: true
min_environment: org
tier: core
source_repo: microsoft/sre-agent
source_path: labs/starter-lab/README.md
license: MIT
references:
  - https://github.com/microsoft/sre-agent
  - https://github.com/microsoft/sre-agent/tree/main/labs/starter-lab
  - https://sre.azure.com/docs/capabilities/incident-response
  - https://sre.azure.com/docs/concepts/hooks
  - https://github.com/Azure/sre-agent-plugins
