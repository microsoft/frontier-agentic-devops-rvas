id: sre-agent-04
title: Investigate a Controlled Azure Incident
module: sre-agent
track: azure-sre-agent
difficulty: intermediate
duration_minutes: 60
prerequisites:
  - sre-agent-03
prerequisite_capabilities:
  - Azure SRE Agent portal access
  - Grubify deployed or fallback evidence packet available
  - Azure Monitor and Log Analytics basics
description: Trigger the official Grubify break scenario, observe Azure Monitor incident routing, and use Azure SRE Agent to investigate runtime evidence before accepting any remediation.
success_criteria:
  - A controlled Grubify failure is triggered or represented through fallback evidence.
  - The team captures the starting symptom, timestamp, alert, and affected user action.
  - Azure SRE Agent queries or cites logs, metrics, traces, runbooks, or resource state.
  - The likely cause is separated from alternatives and unknowns.
  - Any mitigation is treated as operational action with a review or coach checkpoint.
  - Recovery is verified through browser or endpoint evidence.
take_home_action: Route one non-production alert from your real Azure Monitor workspace to Azure SRE Agent and use it to investigate logs, metrics, traces, and resource state.
take_home_owner: solution-architect
take_home_signal: The investigation cites real Azure observability evidence, separates likely cause from alternatives, and records a reviewed mitigation path.
tags:
  - azure
  - incident-response
  - azure-monitor
  - log-analytics
app_dependency: grubify-starter-lab
emu_compatible: true
min_environment: org
tier: core
source_repo: microsoft/sre-agent
source_path: labs/starter-lab/README.md
license: MIT
references:
  - https://github.com/microsoft/sre-agent/tree/main/labs/starter-lab
  - https://sre.azure.com/docs/capabilities/incident-response
  - https://sre.azure.com/docs/capabilities/diagnose-azure-observability
  - https://learn.microsoft.com/en-us/azure/azure-monitor/logs/log-analytics-overview
