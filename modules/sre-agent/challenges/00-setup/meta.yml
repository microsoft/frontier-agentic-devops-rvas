id: sre-agent-00
title: Environment Setup
module: sre-agent
track: agentic-lifecycle
difficulty: beginner
duration_minutes: 30
prerequisites: []
prerequisite_capabilities:
  - GitHub account
  - Basic Git and CLI usage
  - Azure subscription (Contributor role)
  - GitHub organization access (branch workflow, not fork)
  - GitHub CLI (gh >= 2.x) installed or available via Codespaces
description: >
  Provision your development environment for the Agentic DevOps hackathon.
  Open the Contoso Claims repository in GitHub Codespaces (or a local dev container),
  authenticate the GitHub CLI and Azure CLI, verify your Azure subscription access,
  and confirm the baseline app is reachable before Challenge 01.
success_criteria:
  - "`gh auth status` exits 0 and shows your username"
  - "`az account show` returns your Azure subscription with Contributor role confirmed"
  - "`gh repo view microsoft/frontier-agenticdevops-hackathon` returns repository metadata without error"
  - "`cd modules/sre-agent/resources/sample-app && npm test` passes all baseline tests"
  - "The Codespaces or dev container environment is open, port 3000 forwarded, and the terminal is ready"
tags:
  - setup
  - devcontainer
  - sre-agent
app_dependency: contoso-claims
emu_compatible: true
min_environment: org
tier: setup
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: Student/Challenge-00-Setup.md
license: MIT
references:
  - https://docs.github.com/en/codespaces/getting-started/quickstart
  - https://cli.github.com/manual/
  - https://learn.microsoft.com/en-us/cli/azure/install-azure-cli
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#contributor
