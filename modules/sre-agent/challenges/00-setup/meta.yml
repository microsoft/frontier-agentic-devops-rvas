id: sre-agent-00
title: Prepare the Azure SRE Agent Lab
module: sre-agent
track: azure-sre-agent
difficulty: beginner
duration_minutes: 45
prerequisites: []
prerequisite_capabilities:
  - GitHub account
  - Basic Git and CLI usage
  - Azure subscription with Owner role for the lab subscription or approved resource group
  - Azure CLI 2.60+
  - Azure Developer CLI 1.9+
  - Python 3.10+
description: >
  Prepare the official Microsoft Azure SRE Agent starter lab. Verify the tools,
  Azure role assignments, supported region, and repository access needed to deploy
  the Grubify sample application, Azure Monitor alerts, Log Analytics, Application
  Insights, and an Azure SRE Agent.
success_criteria:
  - "`az account show` returns the intended subscription"
  - "The participant confirms Owner role or a coach-approved pre-provisioned environment"
  - "`az provider register -n Microsoft.App --wait` succeeds or is already registered"
  - "The official `microsoft/sre-agent` starter-lab prerequisites are understood"
  - "A fallback evidence packet is selected if live deployment is not available"
tags:
  - setup
  - sre-agent
  - azure-monitor
app_dependency: grubify-starter-lab
emu_compatible: true
min_environment: org
tier: setup
source_repo: microsoft/sre-agent
source_path: labs/starter-lab/README.md
license: MIT
references:
  - https://github.com/microsoft/sre-agent/tree/main/labs/starter-lab
  - https://learn.microsoft.com/en-us/cli/azure/install-azure-cli
  - https://learn.microsoft.com/en-us/azure/developer/azure-developer-cli/install-azd
  - https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles#owner
