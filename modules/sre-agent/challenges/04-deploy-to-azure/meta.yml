id: sre-agent-04
title: Deploy to Azure with GitHub Actions
module: sre-agent
track: agentic-lifecycle
difficulty: intermediate
duration_minutes: 75
prerequisites:
  - sre-agent-03
prerequisite_capabilities:
  - GitHub Copilot access
  - Basic Git workflow
  - Active Azure subscription (required for deployment target; a fallback evidence packet is provided if unavailable)
  - Azure CLI basics
  - GitHub Actions YAML basics
description: Deploy the sample app through GitHub Actions to a coach-provided Azure Container Apps target, capture healthy runtime evidence, and demonstrate one controlled failure mode for SRE investigation.
success_criteria:
  - A workflow validates the sample app on pull requests.
  - Deployment to Azure runs successfully, or the team uses the documented fallback packet when access is blocked.
  - Secrets or credentials are not exposed in logs or committed files.
  - Environment controls are visible, even if simplified for the workshop.
  - The team captures healthy deployment evidence that can be used during incident triage.
  - The team deploys or simulates a controlled checkout failure and labels it as intentional evidence.
  - The team can explain what an agent is allowed to suggest and what only deterministic gates or humans can authorize.
  - 'Coach conversation — in your real deployment pipeline, where does the deterministic/probabilistic seam sit today: what does automation decide on its own, and what requires a human approval or deterministic gate before reaching production? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
  - azure
  - deployment
  - github-actions
  - environments
app_dependency: contoso-app
emu_compatible: true
min_environment: org
tier: core
