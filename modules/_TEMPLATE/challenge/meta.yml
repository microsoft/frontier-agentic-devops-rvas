# === Required ===
id: REPLACE-module-localid       # Globally unique. Convention: <module>-<local-id>
                                 # Examples: ghec-ch01, ghas-00, ghaw-01, sre-agent-00
title: "REPLACE: Short Activity Title"
module: REPLACE                  # One of: ghec | ghas | ghaw | sre-agent
track: REPLACE-track-slug        # See CONTRIBUTING.md for the module → track table
difficulty: beginner             # beginner | intermediate | advanced
duration_minutes: 60             # Estimated delivery time for a delivery team member in minutes

# === Independence fields ===
prerequisites:                   # Challenge IDs that must be done first. Empty = none.
  []
prerequisite_capabilities:       # Capabilities a delivery team member needs (not work packages to complete).
  - "GitHub account"
  - "Basic Git knowledge"

# === Descriptive ===
description: "REPLACE: One-sentence customer-adoption outcome shown in the catalog card."
success_criteria:
  - "REPLACE: First observable implementation or governance outcome"
  - "REPLACE: Second observable customer-owned evidence or artefact"

tags:
  - REPLACE-tag-1
  - REPLACE-tag-2

# === Operational ===
app_dependency: none             # none | juice-shop | grubify-starter-lab | seed-repo
emu_compatible: true             # Can this run in an EMU-controlled org?
min_environment: org             # org | repo | codespace
provision_creates:               # Resources the setup script creates (human-readable).
  - "REPLACE: describe any repos, boards, or resources created"

# === Attribution ===
source_repo: microsoft/REPLACE-source-repo
source_path: REPLACE/path/to/original/file.md
license: MIT

# === Optional ===
tier: core                       # core | stretch | bonus | setup
references:
  - https://docs.github.com/
