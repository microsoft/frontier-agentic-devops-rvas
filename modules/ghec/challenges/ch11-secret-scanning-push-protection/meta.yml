id: ghec-ch11
title: Secret Scanning & Push Protection
module: ghec
track: security
difficulty: beginner
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub Advanced Security license enabled on the org
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
description: By the end of this challenge you can turn on GitHub secret scanning, triage real leaked-credential alerts, block new secrets at `git push` with push protection, and wire up a custom pattern and a bypass-audit — all on a public OWASP Juice Shop repo seeded with high-confidence planted secrets.
success_criteria:
- '`secret_scanning` **and** `secret_scanning_push_protection` both read `enabled` on `wth-ch11-juice-shop` (verifiable via the `security_and_analysis` API).'
- '**Every planted secret in `SECRETS-MANIFEST.md` has a corresponding secret-scanning alert** (count + types reconcile).'
- '**All alerts are resolved** with an explicit, correct resolution reason (none left `open`).'
- You **demonstrated push protection blocking** a fresh secret at `git push` (and a clean push after removing it).
- At least **one push-protection bypass** exists with a recorded actor and reason (verifiable via the alerts API).
- A **custom secret-scanning pattern** is published and raised at least one alert.
- A **triage summary** issue exists on the repo.
- 'Coach conversation — if you turned push protection on across your real org tomorrow, whose workflow breaks first and what secret would it have caught in your last six months of commits? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
- ghas
- secret-scanning
- push-protection
- custom-patterns
- juice-shop
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch11-juice-shop (public, OWASP Juice Shop imported at v20.0.0, pulled from official source — never vendored)
- planted high-confidence non-live test secrets across history (fake AWS AKIA key + paired secret, GitHub-style ghp_ token)
- SECRETS-MANIFEST.md documenting each planted secret and its location
- branch feature/leaky-config carrying one fresh planted secret to exercise push protection
tier: core
