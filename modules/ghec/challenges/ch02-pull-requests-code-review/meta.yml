id: ghec-ch02
title: Branches, Pull Requests & Code Review
module: ghec
track: developer-flow
difficulty: beginner
duration_minutes: 180
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via challenge setup script
description: By the end of this challenge you can drive a professional pull-request lifecycle — feature branches, reviews, `CODEOWNERS`, required reviewers, merge-conflict resolution, and the three merge strategies — entirely from an org-owner token.
success_criteria:
- At least **three pull requests** were opened against `main` (CLI or UI), one started as a **draft**.
- A review contains **line comments, a thread, and a `suggestion` block**; at least one PR shows a **request-changes → fix → resolve** cycle.
- A valid **`.github/CODEOWNERS`** exists and a PR touching an owned path **auto-requested the owner**.
- '**`main` is protected**: PR required, ≥1 approval, **require Code Owner review**, no direct pushes.'
- A **merge conflict was resolved** and that branch merged cleanly afterward.
- '**All three merge strategies are enabled** and each was used at least once (verifiable from commit history).'
- '`docs/merge-strategy.md` documents the chosen default.'
take_home_action: In your own org, enforce the pull request workflow on a production repository with branch protection, CODEOWNERS, required reviews, PR templates, and an agreed merge strategy.
take_home_owner: developer
take_home_signal: Direct pushes to main are blocked and real pull requests show requested code owners, completed reviews, required checks, and the selected merge strategy in history.
tags:
- pull-requests
- code-review
- codeowners
- branch-protection
- merge-conflicts
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch02-pull-requests-code-review (seeded multi-file app on main)
- two feature branches with open PRs (one clean, one that will conflict)
- .github/pull_request_template.md placeholder
- directory layout mapping cleanly to CODEOWNERS paths (no branch protection yet)
tier: core
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghec/challenges/ch02-pull-requests-code-review/meta.yml
