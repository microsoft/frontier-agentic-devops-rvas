id: ghec-ch15
title: Security Campaigns & Overview
module: ghec
track: security
difficulty: advanced
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub Advanced Security license enabled on the org
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
description: By the end of this challenge you can read the org-level security overview dashboards, roll GHAS out across repos with a security configuration, launch a security campaign that hands prioritized alerts to developers with a deadline, and track remediation to completion — using OWASP Juice Shop's real alert volume as the campaign target.
success_criteria:
- '`wth-ch15-juice-shop` has a **multi-tool alert corpus** (CodeQL **and** Dependabot alerts present, verifiable via the alerts APIs).'
- You used the org **Security overview** Risk and Coverage views and produced an **org-wide alert slice** via the API.
- An **org security configuration** exists and is **applied** to the repo (features show enabled in Coverage).
- A **security campaign** exists with a name, a **manager**, a **due date**, and **guidance**, scoped to a finite alert slice.
- The campaign shows **remediation burn-down** (open count dropped after you fixed/dismissed targeted alerts).
- A **remediation report** issue exists with before/after numbers.
- 'Coach conversation — if you ran a security campaign across your org''s repos today targeting the most common CWE your stack is exposed to, which three repo owners would you expect to push back hardest on fixing their alerts, and what would make the campaign succeed anyway? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
- ghas
- security-overview
- security-campaigns
- remediation
- juice-shop
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch15-juice-shop (public, OWASP Juice Shop imported at v20.0.0, pulled from official source — never vendored)
- rich multi-tool alert corpus (CodeQL OWASP Top 10 + Dependabot vulnerable npm tree + secret scanning) to drive a security campaign
- own standalone alert volume — does NOT depend on ch12/ch13 having run (independence preserved)
tier: core
