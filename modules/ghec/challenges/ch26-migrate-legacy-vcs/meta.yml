id: ghec-ch26
title: Migrate Legacy VCS (SVN, Mercurial, TFVC, Perforce) to GitHub
module: ghec
track: migration
difficulty: advanced
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with repository create rights
- git CLI installed
- 'For SVN: git svn and access to a Subversion repository'
- 'For Mercurial: hg and hg-fast-export with Python available'
- 'For TFVC: an Azure DevOps organization with Azure Repos access'
- 'For Perforce: git-p4 and access to a Perforce depot'
- GitHub CLI installed and authenticated
description: "Execute an authorized legacy-VCS conversion pilot into Git repositories and GitHub with author mapping, size-limit planning, customer-owned validation evidence, accountable ownership, handover, and the cutover decision."
success_criteria:
- 'An SVN repository''s trunk, branches, and tags history was converted to Git with an authors map and pushed to GitHub, or the exact source-specific blocker was documented.'
- 'A Mercurial repository was converted through hg-fast-export with an author map and pushed to GitHub with history intact, or the exact source-specific blocker was documented.'
- 'The TFVC to Azure Repos Git to GitHub path was executed or documented end-to-end, including where ch21 handles the Azure Repos Git to GitHub migration pattern.'
- 'A Perforce depot path was converted through git-p4 and pushed to GitHub, or the exact source-specific blocker was documented.'
- 'Author identities in converted commits resolve to real names and email addresses instead of unknown or raw source usernames.'
- 'Large-file and large-push risks were checked, including 100 MiB file blocks, Git LFS candidates, and the 2 GiB single-push limit.'
- 'At least one converted repository exists in GitHub with branches and tags visible and expected commit history preserved.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
