id: ghec-ch05
title: Advanced PR Automation & Rulesets
module: ghec
track: developer-flow
difficulty: advanced
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via activity setup script
description: "Implement an authorized customer governed merge pipeline with repository and organization rulesets, required checks and reviewers, auto-merge, `CODEOWNERS`, draft-PR gating, and Actions-driven PR automation. Preserve approval, safety, ownership, and rollout evidence."
success_criteria:
- An **active repository ruleset** on `main` requires PR + ≥1 approval + **code-owner review** + the **`build` status check** + linear history, and **blocks direct pushes** (demonstrated).
- '**CODEOWNERS** is valid; a `/src/` PR **auto-requests** the owner; a **bypass actor** is configured and documented.'
- '**Auto-merge** is enabled and a clean PR **merged itself** once gates passed; a failing PR did **not**.'
- A **PR template** pre-fills new PRs; a **draft** PR demonstrably blocks auto-merge/reviewers until marked ready.
- '**Auto-labeling** assigns `area:` labels by path; an **open-PR comment** workflow fires; a **stale** workflow labels/closes inactive PRs.'
- An **organization ruleset** targeting `ghec-ch05-*` is active and layers with the repo ruleset.
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- rulesets
- pull-requests
- automation
- codeowners
- auto-merge
- merge-queue
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch05-advanced-pr-automation (seeded app + working CI emitting a 'build' check)
- several open PRs in mixed states (clean, failing-CI, draft, missing-owner-review)
- starter .github/CODEOWNERS + placeholder .github/pull_request_template.md
- no rulesets yet (a delivery team member creates repository and organization rulesets)
tier: core
