id: ghec-ch05
title: Advanced PR Automation & Rulesets
module: ghec
track: developer-flow
difficulty: advanced
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via challenge setup script
description: By the end of this challenge you can run a hands-off, governed merge pipeline — repo & org **rulesets**, required status checks + required reviewers, **auto-merge**, **CODEOWNERS**, draft-PR gating, and Actions-driven PR automation (labeling, assignment, stale handling) — all from an org and an org-owner token.
success_criteria:
- An **active repository ruleset** on `main` requires PR + ≥1 approval + **code-owner review** + the **`build` status check** + linear history, and **blocks direct pushes** (demonstrated).
- '**CODEOWNERS** is valid; a `/src/` PR **auto-requests** the owner; a **bypass actor** is configured and documented.'
- '**Auto-merge** is enabled and a clean PR **merged itself** once gates passed; a failing PR did **not**.'
- A **PR template** pre-fills new PRs; a **draft** PR demonstrably blocks auto-merge/reviewers until marked ready.
- '**Auto-labeling** assigns `area:` labels by path; an **open-PR comment** workflow fires; a **stale** workflow labels/closes inactive PRs.'
- An **organization ruleset** targeting `wth-ch05-*` is active and layers with the repo ruleset.
- 'Coach conversation — which repetitive PR task on your current team (auto-labeling, reviewer assignment, size checks, changelog enforcement) costs the most human time per week, and what could a composite action or reusable workflow replace? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
- rulesets
- pull-requests
- automation
- codeowners
- auto-merge
- merge-queue
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch05-advanced-pr-automation (seeded app + working CI emitting a 'build' check)
- several open PRs in mixed states (clean, failing-CI, draft, missing-owner-review)
- starter .github/CODEOWNERS + placeholder .github/pull_request_template.md
- no rulesets yet (student creates repo + org rulesets)
tier: core
