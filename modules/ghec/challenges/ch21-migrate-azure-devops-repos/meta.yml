id: ghec-ch21
title: Migrate Azure DevOps Repos with GitHub Enterprise Importer
module: ghec
track: migration
difficulty: intermediate
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- Azure DevOps Services Cloud organization with at least one Git repo containing pull request history
- GitHub CLI (gh >= 2.4.0) installed
- git installed
- PowerShell installed for running the generated .ps1 migration script
- Classic GitHub personal access token available for migration
- Azure DevOps personal access token available for migration
- Ability to authorize a GitHub PAT for SAML SSO when the destination organization enforces SAML
description: Learn to migrate an Azure DevOps Services Git repository, pull request metadata, work item links, branch policies, and user attribution into GitHub Enterprise Cloud using GitHub Enterprise Importer and gh ado2gh.
success_criteria:
- An Azure DevOps Services Git repository with at least one pull request is migrated into the target GitHub organization.
- '`gh ado2gh inventory-report` produced `repos.csv`, and the selected repository row was reviewed for pull request count and migration risk.'
- The migrated GitHub repository contains Git source history and the migrated pull request history.
- At least one migrated pull request in GitHub shows its Azure Boards work item link or the learner documents why the source PR had no work item link.
- The migrated repository is private by default or its visibility was intentionally set with `--target-repo-visibility` and verified after migration.
- Migration logs were downloaded within the 24-hour availability window or the learner documented the exact command and migration ID needed to retrieve them.
- At least one mannequin was reclaimed, or the mannequin CSV was generated and an org-owner-approved reclaim plan was documented.
- Coach conversation — connect this migration to a real repository, owner team, cutover window, and post-migration backlog the learner owns.
tags:
- azure-devops
- github-enterprise-importer
- migration
- ado2gh
- mannequins
- pull-requests
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- Migrated GitHub repository in the target organization
- Inventory report CSV files generated by gh ado2gh
- PowerShell migration script generated by gh ado2gh
- Mannequin mapping CSV for post-migration attribution
tier: core
outcomes:
