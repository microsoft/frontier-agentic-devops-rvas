id: ghec-ch23
title: Convert Azure Pipelines to GitHub Actions
module: ghec
track: migration
difficulty: intermediate
duration_minutes: 180
prerequisites: []
prerequisite_capabilities:
- GitHub organization and repository access, ideally the repository migrated from Azure DevOps in ch21
- Azure DevOps organization with at least one Azure Pipeline to convert
- Docker installed and running, because GitHub Actions Importer runs as a container
- GitHub CLI installed with the GitHub Actions Importer extension available
- Azure DevOps personal access token with read access to pipelines, code, releases, service connections, task groups, variable groups, and agent pools
description: Convert an Azure DevOps Pipeline into a reviewable GitHub Actions workflow using GitHub Actions Importer audit, forecast, dry-run, and migrate commands.
success_criteria:
- '`audit` produced a report summarizing the Azure DevOps pipeline footprint, conversion status, manual tasks, secrets, runners, and unsupported items.'
- '`forecast` produced an Actions usage estimate from Azure DevOps pipeline history.'
- '`dry-run` generated a reviewable GitHub Actions workflow YAML locally without opening a pull request.'
- '`migrate` opened a pull request that adds a converted `.github/workflows/*.yml` file to the target GitHub repository.'
- 'The generated workflow was reviewed and at least one unsupported, unknown, secret, variable, runner, or service-connection gap was documented with the required manual fix.'
- 'The migrated workflow ran successfully in GitHub Actions after required cleanup.'
take_home_action: In your own tenant, run Actions Importer against one Azure DevOps pipeline wave and convert each pipeline into a reviewed GitHub Actions pull request with manual gaps tracked.
take_home_owner: solution-architect
take_home_signal: The converted workflow runs in GitHub Actions and the migration plan lists unresolved secrets, runners, variables, service connections, and unsupported tasks.
