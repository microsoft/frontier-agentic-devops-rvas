id: ghec-ch17
title: Webhooks & GitHub Apps
module: ghec
track: automation-ai
difficulty: intermediate
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via challenge setup script
description: By the end of this challenge you can receive GitHub events over webhooks, verify their payloads cryptographically, and register and install a minimal GitHub App that authenticates as an installation — all from an org and an org-owner token.
success_criteria:
- A **repository webhook** delivers **Issues** and **Push** events to your receiver (shown in Recent Deliveries).
- You can identify `X-GitHub-Event`, `X-GitHub-Delivery`, and `X-Hub-Signature-256` on a delivery.
- Your receiver **verifies the HMAC-SHA256 signature** and **rejects** a tampered/wrong-secret payload (demonstrated).
- An **organization webhook** exists and a real org event was delivered and verified.
- A **GitHub App** is registered with scoped permissions + event subscriptions and **installed** on the org.
- You minted an **installation access token** and the App **posted a comment as a bot identity**.
- 'Coach conversation — which external system in your workflow (Jira, Slack, PagerDuty, a deployment dashboard) is updated by hand after a GitHub event, and what webhook payload or GitHub App permission would let you wire it up automatically? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
- webhooks
- github-apps
- hmac
- automation
- integrations
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch17-webhooks-github-apps (seeded)
- receiver scaffold (Bash + Node HMAC-verify snippet) + Actions receiver.yml (repository_dispatch path)
- WEBHOOK-SETUP.md covering smee.io and Actions-receiver options
- GitHub App manifest app-manifest.json for one-click App registration
tier: core
