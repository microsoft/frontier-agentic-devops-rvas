id: ghec-ch22
title: Connect Azure Boards to GitHub
module: ghec
track: migration
difficulty: intermediate
duration_minutes: 120
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner/admin rights on the target repository
- Azure DevOps Services organization with an Azure Boards project
- Ability to install or request installation of a GitHub Marketplace organization app
description: Restore post-migration work-item-to-code traceability by connecting an Azure Boards project to migrated GitHub repositories and validating AB# links from commits and pull requests.
success_criteria:
- The **Azure Boards** GitHub Marketplace app is installed for the GitHub organization and the migrated repository is selected for repository access.
- The Azure Boards project shows a **GitHub connection** to the migrated repository under **Project settings > GitHub connections**.
- A commit or pull request using **`AB#<work-item-id>`** creates a visible GitHub commit or pull request link in the Azure Boards work item's **Development** section.
- A pull request description using a supported transition phrase such as **`Fixes AB#<work-item-id>`** is merged into the default branch and transitions the linked work item to the expected Resolved/Completed workflow-category state.
- The GitHub pull request shows the linked Azure Boards work item in its **Development** section when `AB#` is present in the pull request description.
- You can explain and fix at least one failed-link scenario, such as wrong Azure DevOps organization, missing app permissions, or malformed `AB#` syntax.
tags:
- azure-boards
- github-apps
