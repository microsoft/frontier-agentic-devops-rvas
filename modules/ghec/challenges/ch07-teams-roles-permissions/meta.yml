id: ghec-ch07
title: Teams, Roles & Base Permissions
module: ghec
track: admin-governance
difficulty: intermediate
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via challenge setup script
description: By the end of this challenge you can model a real organization's access with **nested teams**, **base permissions**, **predefined repository roles**, and a **custom repository role** — granting least-privilege access that's verifiable from the API, all from an org and an org-owner token.
success_criteria:
- A **parent team** has **two child teams**, confirmed nested via the API (`.parent.name` is non-null).
- The **parent** grants `Read` on all three repos and that access **inherits** to the children (verifiable on a child team's repo permissions).
- Each **squad** has `Write` on its own repo only; neither has Write on `wth-ch07-platform`.
- A team holds the **Maintain** predefined role on `wth-ch07-platform`.
- A **custom repository role** exists (`gh api /orgs/<org>/custom-repository-roles` lists it) and is **assigned** to a team on a repo.
- An **`ACCESS.md`** access matrix exists, generated from the API, and a before/after comparison shows the org is now team-modeled.
- 'Coach conversation — map your real team''s structure onto GitHub Teams right now: where do people have more access than they need, and where is the absence of the right permission creating an actual bottleneck for someone? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
- teams
- permissions
- repository-roles
- custom-roles
- access-control
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch07-frontend (seeded README + src tree)
- repo wth-ch07-backend (seeded README + src tree)
- repo wth-ch07-platform (seeded README + src tree)
- flat starter team wth-ch07-engineering (one member, no repo access yet)
- printed access snapshot of current teams + repo grants
tier: core
