id: ghec-ch07
title: Teams, Roles & Base Permissions
module: ghec
track: admin-governance
difficulty: intermediate
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via activity setup script
description: "Implement an authorized customer least-privilege access model with nested teams, base permissions, predefined repository roles, and a custom repository role. Preserve API-verifiable access evidence, accountable ownership, and the rollout decision."
success_criteria:
- A **parent team** has **two child teams**, confirmed nested via the API (`.parent.name` is non-null).
- The **parent** grants `Read` on all three repos and that access **inherits** to the children (verifiable on a child team's repo permissions).
- Each **squad** has `Write` on its own repo only; neither has Write on `ghec-ch07-platform`.
- A team holds the **Maintain** predefined role on `ghec-ch07-platform`.
- A **custom repository role** exists (`gh api /orgs/<org>/custom-repository-roles` lists it) and is **assigned** to a team on a repo.
- An **`ACCESS.md`** access matrix exists, generated from the API, and a before/after comparison shows the org is now team-modeled.
- '**Governance register updated:** Added rows for org-teams (parent/child hierarchy, inheritance) and custom-repository-roles with API snapshot links and reference to `ACCESS.md` matrix.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- teams
- permissions
- repository-roles
- custom-roles
- access-control
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch07-frontend (seeded README + src tree)
- repo ghec-ch07-backend (seeded README + src tree)
- repo ghec-ch07-platform (seeded README + src tree)
- flat starter team ghec-ch07-engineering (one member, no repo access yet)
- printed access snapshot of current teams + repo grants
