- git-mirror
- pull-requests
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- GitHub destination repositories created by the learner during migration
- Temporary migration archive in Bitbucket shared home for Server/Data Center exports
- Temporary staging objects in AWS S3, Azure Blob, or GitHub-owned blob storage
