id: ghec-ch24
title: Migrate Bitbucket to GitHub (Server & Cloud)
module: ghec
track: migration
difficulty: advanced
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub org with org-owner rights
- Classic GitHub PAT
- 'Server/Data Center path: Bitbucket Server/Data Center 5.14+ instance with admin access, SSH/SFTP or SMB access, and blob storage using AWS S3, Azure Blob, or GitHub-owned storage'
- 'Cloud path: bitbucket.org repository and git CLI'
- GitHub CLI >= 2.4.0
- PowerShell because generated migration scripts are .ps1 files
description: Learn the supported Bitbucket Server/Data Center migration path with gh bbs2gh and the source-history-only fallback for Bitbucket Cloud.
success_criteria:
- A Bitbucket Server/Data Center repository with pull request history is migrated with gh bbs2gh and its pull requests, reviews, line comments, required reviewers, and attachments are visible in GitHub.
- Blob storage using AWS S3, Azure Blob, or GitHub-owned storage is configured and used as the staging location for the Server/Data Center migration archive.
- The learner can explain the multi-hop bbs2gh flow from Bitbucket export API to SFTP/SMB download, blob upload, and GEI import into GitHub Enterprise Cloud.
- Bulk migration evidence exists from gh bbs2gh generate-script or the learner can explain why the single-repo command was used instead.
- The two-phase manual archive path is practiced or documented, including where the .tar archive is produced under BITBUCKET_SHARED_HOME.
- A Bitbucket Cloud repository is mirror-pushed to GitHub and all Git branches and tags are present in the destination repository.
- The learner documents which Bitbucket data does not migrate for Server/Data Center and which collaboration metadata is lost for Bitbucket Cloud.
take_home_action: In your own tenant, define the Bitbucket Server, Data Center, or Cloud migration wave with staging storage, validation evidence, rollback, and retry procedures.
take_home_owner: solution-architect
take_home_signal: A migrated GitHub repository preserves expected branches, tags, pull request metadata where supported, and a wave runbook records cutover risks and fallback steps.
tags:
- bitbucket
- github-enterprise-importer
- migration
