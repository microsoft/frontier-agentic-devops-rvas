id: ghec-ch24
title: Migrate Bitbucket to GitHub (Server & Cloud)
module: ghec
track: migration
difficulty: advanced
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub org with org-owner rights
- Classic GitHub PAT
- 'Server/Data Center path: Bitbucket Server/Data Center 5.14+ instance with admin access, SSH/SFTP or SMB access, and blob storage using AWS S3, Azure Blob, or GitHub-owned storage'
- 'Cloud path: bitbucket.org repository and git CLI'
- GitHub CLI >= 2.4.0
- PowerShell because generated migration scripts are .ps1 files
description: "Execute an authorized Bitbucket migration pilot using the supported Server/Data Center `gh bbs2gh` path or the source-history-only Bitbucket Cloud fallback. Preserve migration-fidelity evidence, loss ownership, handover, and the cutover decision."
success_criteria:
- A Bitbucket Server/Data Center repository with pull request history is migrated with gh bbs2gh and its pull requests, reviews, line comments, required reviewers, and attachments are visible in GitHub.
- Blob storage using AWS S3, Azure Blob, or GitHub-owned storage is configured and used as the staging location for the Server/Data Center migration archive.
- A customer practitioner can explain the multi-hop bbs2gh flow from Bitbucket export API to SFTP/SMB download, blob upload, and GEI import into GitHub Enterprise Cloud.
- Bulk migration evidence exists from gh bbs2gh generate-script or a customer practitioner can explain why the single-repo command was used instead.
- The two-phase manual archive path is practiced or documented, including where the .tar archive is produced under BITBUCKET_SHARED_HOME.
- A Bitbucket Cloud repository is mirror-pushed to GitHub and all Git branches and tags are present in the destination repository.
- A customer practitioner documents which Bitbucket data does not migrate for Server/Data Center and which collaboration metadata is lost for Bitbucket Cloud.
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- bitbucket
- github-enterprise-importer
- migration
- bbs2gh
- git-mirror
- pull-requests
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- GitHub destination repositories created by a customer practitioner during migration
- Temporary migration archive in Bitbucket shared home for Server/Data Center exports
- Temporary staging objects in AWS S3, Azure Blob, or GitHub-owned blob storage
