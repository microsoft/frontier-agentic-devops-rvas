id: ghec-ch09
title: Audit Log & Streaming
module: ghec
track: admin-governance
difficulty: advanced
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
description: "Implement an authorized customer audit-log investigation and export capability using the org audit-log UI, search syntax, and REST API. Preserve the repeatable query/export artefacts, accountable owner, and next adoption action."
success_criteria:
- You can pull recent org audit events from the **API** (`gh api /orgs/<org>/audit-log` returns events with `action`/`actor`/`created_at`).
- A **known event set** was generated in Part B and **every** action is findable via search or API.
- At least **three distinct search filters** (`action:`, `actor:`, `repo:`, or `created:`) were used and produced correct results.
- A **combined, time-bounded API query** returns a sensible count for today's events.
- An **export script** committed to the repo pulls a time-bounded slice to JSON and the output contains your events.
- A **`FINDINGS.md`** answers three investigative questions with the exact filter used.
- '**Governance register updated:** Distinguished the org audit export row from enterprise streaming and IP-display decisions, with export evidence, destination/retention, privacy rationale, and accountable owner.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- audit-log
- api
- streaming
- investigation
- governance
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch09-audit-target (populated main, safe object for auditable actions)
- team ghec-ch09-auditors (for membership/permission-change events)
- printed sample of recent org audit events from the API
