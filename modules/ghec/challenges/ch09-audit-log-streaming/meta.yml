- governance
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo wth-ch09-audit-target (populated main, safe object for auditable actions)
- team wth-ch09-auditors (for membership/permission-change events)
- printed sample of recent org audit events from the API
