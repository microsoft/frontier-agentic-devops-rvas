id: ghec-ch20
title: Automation Capstone
module: ghec
track: automation-ai
difficulty: advanced
duration_minutes: 480
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via challenge setup script
description: 'By the end of this challenge you have built one **end-to-end automation** that ties the whole track together: a **GitHub App** authenticates against the **REST and GraphQL APIs**, a **webhook** drives it in real time, and **Actions** runs the glue — all on a self-contained seeded repo using an org and an org-owner token.'
success_criteria:
- A **GitHub App** is **registered and installed** on the seeded repo and mints a working **installation token**.
- Inbound webhooks are **signature-verified** (HMAC-SHA256); bad signatures are rejected.
- On `issues.opened`, the App **labels + comments** via REST and the action is **idempotent** on redelivery.
- The issue is **added to `ghec-ch20-board`** with a **Status** field set via **GraphQL**, also idempotent.
- '**Actions** orchestrates the flow and records a **run summary**, with all credentials in **Actions secrets**.'
- You demonstrated the **full end-to-end loop** from a single fresh issue and documented its **failure modes**.
take_home_action: In your own org, deploy an end-to-end automation that combines a GitHub App, signed webhooks, REST and GraphQL mutations, Actions orchestration, and secret-backed credentials.
take_home_owner: developer
take_home_signal: Opening a real issue triggers the full automation path, updates labels, comments, and project fields once, and records an auditable Actions run summary.
tags:
- github-apps
- webhooks
- rest-api
- graphql
- actions
- capstone
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch20-automation-capstone (seeded App handler scaffold + ready-made auth helpers src/auth.js + automation.yml + CAPSTONE.md)
- empty org Projects v2 board ghec-ch20-board for the GraphQL step to populate
tier: core
