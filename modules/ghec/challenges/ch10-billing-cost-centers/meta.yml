id: ghec-ch10
title: Billing, Cost Centers & Usage
module: ghec
track: admin-governance
difficulty: advanced
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
description: "Implement an authorized customer cost-governance baseline: inspect Actions, Packages, and Storage usage; set budgets and alerts; retrieve billing usage from the API; and produce a customer-owned cost report with an accountable owner."
success_criteria:
- A **before** usage snapshot was captured from the billing **API** (Actions minutes + storage).
- At least **two Actions runs** were generated and **usage increased** (verifiable via `gh run list` + the billing API delta).
- A **budget** is configured at the org with at least one **alert threshold** below the cap.
- You can **reconcile** the API usage total against the UI Usage page and explain the cost model (included vs metered; per-minute price varies by runner OS/SKU).
- A committed **cost-report script** runs and produces a product/used/included/billable table.
- A **`COST-REPORT.md`** exists with the before/after delta and a budget recommendation.
- '**Governance register updated:** Added row for billing domain (budgets, usage alerts, cost-reconciliation baseline) with API snapshot links and configured budget settings.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- billing
- usage
- cost-centers
- budgets
- reporting
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch10-usage-generator (tiny workflow_dispatch Actions workflow to generate small metered usage)
- repo ghec-ch10-cost-report (holds reconciliation script + final report)
- printed current usage snapshot (Actions minutes / storage from the API)
