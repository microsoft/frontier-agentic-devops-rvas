id: ghec-ch16
title: REST & GraphQL API Automation
module: ghec
track: automation-ai
difficulty: beginner
duration_minutes: 180
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via activity setup script
description: "Implement an authorized customer GitHub API automation using REST and GraphQL reads and writes, pagination, idempotency, and rate-limit controls. Preserve the customer-owned automation, accountable owner, and rollout decision."
success_criteria:
- You performed both a **REST read** and a **REST write** (label created, issues labeled, comment posted) via `gh api`.
- You **paged through all seeded issues** with REST `--paginate` and the count matches the seeded total.
- You ran a **parameterized GraphQL query** with variables and **cursor-paginated** it to completion.
- You executed at least one **GraphQL mutation** (added issues to `ghec-ch16-board` and set their `Status`).
- You inspected **`rate_limit`** and your reconcile script **backs off** when `remaining` is low.
- Your reconcile script is **idempotent** — a second run produces **no changes**.
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- rest-api
- graphql
- automation
- pagination
- projects-v2
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch16-rest-graphql-automation (seeded, src/ + docs/ layout)
- ~60 seeded issues in mixed states (open/closed, many unlabeled) for real pagination
- starter label set (bug, enhancement, triage, area:backend, area:docs) with deliberate gaps
- empty org Projects v2 board ghec-ch16-board to populate via GraphQL
tier: core
source_repo: microsoft/frontier-agentic-devops-rvas
