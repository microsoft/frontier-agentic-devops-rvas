id: ghec-ch18
title: Self-Hosted & Larger Runners
module: ghec
track: automation-ai
difficulty: advanced
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via activity setup script
description: "Implement an authorized customer self-hosted runner through an organization runner group, with label routing, hardening, scaling, and isolation evidence. Preserve the risk controls, operational owner, and safe rollout decision."
success_criteria:
- An **org runner group** `ghec-ch18-group` exists, scoped to **selected repos** (only `ghec-ch18-self-hosted-runners`).
- A **self-hosted runner** is registered to that group with custom **labels** and shows **Idle/online**.
- '`self-hosted.yml` ran **on your runner** (runner name confirmed) while `hosted.yml` ran on a hosted runner.'
- A **mis-labeled** job stays **queued**, proving label routing.
- The runner runs under a **least-privilege account** and you demonstrated an **ephemeral** registration.
- You documented the **fork-PR risk** and a **GitHub-hosted vs larger vs self-hosted** decision matrix, plus the **org-vs-enterprise runner group** note.
- '**Governance register updated:** Added a row for workflow (self-hosted runner policy) with links to runner group configuration, decision matrix, and risk documentation.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- actions
- self-hosted-runners
- runner-groups
- hardening
- larger-runners
app_dependency: none
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch18-self-hosted-runners (seeded build)
- hosted.yml (ubuntu-latest) + self-hosted.yml (label-targeted, queued until runner exists)
- RUNNER-SETUP.md registration + hardening walkthrough (Linux/macOS/Windows)
- HARDENING.md checklist (service account, ephemeral, fork-PR risk, egress)
tier: core
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghec/challenges/ch18-self-hosted-runners/meta.yml
license: MIT
