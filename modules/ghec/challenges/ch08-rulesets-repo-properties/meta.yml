- repo wth-ch08-prod-identity (populated main + CI emitting a build check)
- repo wth-ch08-internal-tools (populated main + CI emitting a build check)
- repo wth-ch08-sandbox (populated main + CI emitting a build check)
- printed inventory of the four repos (no properties/rulesets yet)
