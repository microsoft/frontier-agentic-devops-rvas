id: ghec-ch08
title: Repository Rulesets & Custom Properties
module: ghec
track: admin-governance
difficulty: intermediate
duration_minutes: 240
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
- Repository provisioned via activity setup script
description: "Implement authorized customer repository governance at scale: define custom repository properties, create organization rulesets that target repositories by property, layer repository rules, and verify enforcement. Preserve approved policy evidence, ownership, and rollout boundaries."
success_criteria:
- Two **custom properties** exist (`compliance` single-select, `prod` true/false), verifiable via `gh api /orgs/<org>/properties/schema`.
- The four repos carry **deliberate property values** (two prod repos `compliance = high`), verifiable via `gh api /orgs/<org>/properties/values`.
- An **organization ruleset** is **Active** and targets repos by **property condition** (`repository_property`, not `repository_name`).
- The org ruleset governs **both** `high`-compliance repos (proven by a rejected direct push on the second repo).
- A **repository ruleset** on one prod repo layers a stricter rule (e.g., 2 approvals) on top of the org ruleset.
- A **`GOVERNANCE.md`** documents the schema, values, and ruleset targeting.
- '**Governance register updated:** Added rows for custom repository properties (schema, property values set on repos) and organization rulesets (property-targeted rules, enforcement, bypass logs) with API snapshot links.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
