id: ghec-ch12
title: Code Scanning with CodeQL & Autofix
module: ghec
track: security
difficulty: intermediate
duration_minutes: 300
prerequisites: []
prerequisite_capabilities:
- GitHub organization with org-owner rights
- GitHub Advanced Security license enabled on the org
- GitHub CLI (gh >= 2.x) installed
- git installed
- jq installed
description: "Implement authorized customer CodeQL code scanning with the selected configuration, vulnerability triage, reviewed Copilot Autofix, and pull-request gating. Use the public repository only as a sample test repository and preserve evidence for the tenant rollout decision."
success_criteria:
- CodeQL is enabled via an **advanced workflow** scanning **`javascript-typescript`** with the `security-extended` suite (visible in `.github/workflows/codeql.yml`).
- At least one completed **CodeQL analysis** exists (verifiable via the `code-scanning/analyses` API).
- The repo has **open code-scanning alerts** including at least one injection/XSS finding with a readable data-flow path.
- You **triaged ≥3 alerts** (one dismissed with a reason via API; others reviewed).
- You applied **Copilot Autofix** to at least one alert and reviewed the suggested patch.
- The **code-scanning check is required** on `main`, and the seeded vulnerable PR is **blocked** until the alert is resolved/dismissed.
- '**Control-catalogue evidence:** The existing customer register records `SEC-CODE-SCANNING` as `approved pilot` after effective-setting inspection, with workflow, analysis, triage, and PR-gate evidence.'
- Customer-owned implementation evidence identifies the authorized scope, accountable owner, relevant risk controls, handover artefact, and next adoption, cutover, or rollout decision.
tags:
- ghas
- codeql
- code-scanning
- autofix
- juice-shop
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
- repo ghec-ch12-juice-shop (public, OWASP Juice Shop imported at v20.0.0, pulled from official source — never vendored)
- real OWASP Top 10 vulnerabilities (SQLi, XSS, broken auth/JWT, path traversal, SSRF) for CodeQL to detect
- branch feature/insecure-endpoint carrying a deliberately vulnerable change to open as a PR for required-check gating
tier: core
