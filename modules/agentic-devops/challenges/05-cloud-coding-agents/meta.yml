id: agentic-devops-05
title: Build GitHub Agentic Workflows and Review Cloud Coding Agents
module: agentic-devops
track: agentic-arc
difficulty: advanced
duration_minutes: 90
prerequisites:
  - agentic-devops-03
prerequisite_capabilities:
  - GitHub Copilot access
  - Basic Git workflow
  - Azure CLI basics
  - GitHub Actions YAML basics
  - GitHub Agentic Workflows basics (gh-aw CLI)
description: After deployment, the product owner identifies several bits of repeatable coordination work: triaging new issues, diagnosing failed CI runs, and breaking a larger request into a plan. These are good candidates for safe agentic workflow specs because the outputs can be reviewed before they affect code or infrastructure.
success_criteria:
  - The issue is specific enough for an agent to attempt without private context.
  - At least two workflow specs exist, and preferably three: issue triage, CI Doctor, and plan command.
  - Each workflow has scoped permissions, safe outputs, no secret exposure, and a human checkpoint for consequential effects.
  - The resulting branch or pull request is reviewed by humans before merge.
  - The review identifies at least one concrete approval reason, risk, or requested change.
  - The team documents whether the task was appropriate for cloud coding agent assistance.
  - Any merged change remains linked to the issue and validation evidence.
