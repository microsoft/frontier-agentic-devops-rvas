id: ghas-s04
title: Fix Broken Access Control
module: ghas
track: security
difficulty: intermediate
duration_minutes: 90
prerequisites:
  - ghas-s01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled on the org repo provisioned in S00
  - GitHub Copilot license assigned
  - Basic familiarity with Node.js/Express route middleware and authentication patterns
  - Completed S01 (attack surface overview) recommended
description: Identify and fix broken access control vulnerabilities (IDOR, missing authorization middleware) in Juice Shop backend routes; enforce server-side ownership checks and role-based authorization in route handlers.
success_criteria:
  - At least 2 access control vulnerabilities identified and fixed in route handlers
  - Fixes enforce authorization server-side, not just through UI restrictions
  - PR descriptions explain the access control gap and the enforcement logic added
  - PR CodeQL/code scanning checks reviewed, with no remaining annotations for the fixed patterns where applicable
  - Application still handles legitimate requests correctly after fixes
  - 'Coach conversation — in your own backend services, are there routes that rely on the frontend to hide restricted actions instead of enforcing ownership server-side, and how would you even know if an authenticated user were calling them directly with a crafted request? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
  - ghas
  - codeql
  - access-control
  - idor
  - authorization
  - middleware
  - juice-shop
  - owasp
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
  - Shared org repo with Juice Shop (OWASP Juice Shop v20+) — provisioned by organizer setup
  - CodeQL scanning active with access-control-class alerts on default branch
tier: core
source_repo: microsoft/frontier-ghas-hackathon
source_path: Student/Challenge-S03.md
license: MIT
references:
