id: ghas-03
title: Fix XSS & Unsafe Output
module: ghas
track: security
difficulty: intermediate
duration_minutes: 90
prerequisites:
  - ghas-01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled on the org repo provisioned in S00
  - GitHub Copilot license assigned
  - Basic familiarity with HTML/JavaScript and frontend frameworks (Angular)
  - Completed S01 (attack surface overview) recommended
description: Fix cross-site scripting (XSS) vulnerabilities in Juice Shop using context-appropriate output encoding and safe framework APIs; retain a technically validated fix and a reusable prevention pattern record in `modules/ghas/resources/ghas-governance-practice.template.md` that covers the unsafe finding, approved pattern, applicability, evidence, GHAS validation, owner, and human-/agent-authored expectation.
success_criteria:
  - A technically validated XSS fix uses context-appropriate output encoding or a safe framework API — not input filtering alone — confirms the application renders expected content, and retains PR/review evidence plus relevant GHAS validation.
  - A reusable prevention pattern record in `modules/ghas/resources/ghas-governance-practice.template.md` states the unsafe pattern/finding class, approved safe pattern, where it applies, PR/review evidence, relevant GHAS validation, named owner, and how the expectation applies to human- and agent-authored changes.
  - Two independently reviewed fixes are used as a practical evidence threshold; completion depends on both the technically validated fix and the reusable prevention pattern record, not the count alone.
  - Any Copilot Autofix or other Copilot assistance is treated as proposed work, reviewed by a human, and handled through existing PR and GHAS controls.
tags:
  - ghas
  - codeql
  - xss
  - cross-site-scripting
  - output-encoding
  - juice-shop
  - autofix
  - angular
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
