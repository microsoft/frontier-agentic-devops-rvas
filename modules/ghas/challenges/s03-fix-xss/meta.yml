id: ghas-s03
title: Fix XSS & Unsafe Output
module: ghas
track: security
difficulty: intermediate
duration_minutes: 90
prerequisites:
  - ghas-s01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled on the org repo provisioned in S00
  - GitHub Copilot license assigned
  - Basic familiarity with HTML/JavaScript and frontend frameworks (Angular)
  - Completed S01 (attack surface overview) recommended
description: Fix cross-site scripting (XSS) vulnerabilities in Juice Shop by applying correct output encoding and safe framework APIs; trace data flows from user input to HTML output and verify fixes through PR code scanning annotations.
success_criteria:
  - At least 2 XSS vulnerabilities fixed
  - Fixes use output encoding or safe framework APIs — not input filtering alone
  - 'PR descriptions explain the data flow: source (user input), sink (HTML output), and encoding applied'
  - PR CodeQL/code scanning checks reviewed, with no remaining annotations for the fixed patterns
  - Application still renders correctly after the fixes
  - 'Coach conversation — which pages or components in your own application render user-supplied content back into the browser, and do you know for certain what encoding is applied before each one hits the DOM? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
  - ghas
  - codeql
  - xss
  - cross-site-scripting
  - output-encoding
  - juice-shop
  - autofix
  - angular
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
  - Shared org repo with Juice Shop (OWASP Juice Shop v20+) — provisioned by organizer setup
  - CodeQL scanning active with XSS-class alerts pre-populated on default branch
tier: core
source_path: Student/Challenge-S02.md
license: MIT
references:
  - https://owasp.org/www-community/attacks/xss/
  - https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html
  - https://docs.github.com/en/code-security/code-scanning/managing-code-scanning-alerts/about-autofix-for-codeql-code-scanning
  - https://angular.io/guide/security#preventing-cross-site-scripting-xss
