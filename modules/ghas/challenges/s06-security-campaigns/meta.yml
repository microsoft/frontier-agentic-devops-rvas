id: ghas-s06
title: Security Campaigns (Advanced)
module: ghas
track: security
difficulty: advanced
duration_minutes: 90
prerequisites:
  - ghas-s01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled at organization level (Team plan or higher with Code Security license)
  - GitHub Copilot license assigned
  - Completed at least one of S02–S05 recommended (to have fixed alerts to reference)
  - Org-level Security Overview access (or ability to write a campaign plan if unavailable)
description: Design and create a GitHub Security Campaign to coordinate systematic remediation of a vulnerability class at scale; scope alerts, assign to developers, set a deadline, and track progress in the Security Overview dashboard.
success_criteria:
  - Campaign scope defined and justified with rationale (risk, volume, effort)
  - 'Option A: Security campaign created with name, due date, and at least 5 alerts scoped — progress tracked in the campaign view'
  - 'Option B (no org access): Written campaign plan covering scope, assignees, timeline, and definition of done'
  - 'Reflection written: what would you prioritize in a real production codebase, and why?'
  - 'Coach conversation — if you had to pitch a security campaign for your own team''s codebase today, which vulnerability class would you tackle first, how would you make the case to your engineering lead, and what would your definition of done actually be? Talk it through with your coach and connect it to a real project, task, or workflow you own.'
tags:
  - ghas
  - security-campaigns
  - security-overview
  - remediation
  - org-level
  - advanced
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
  - Shared org repo with Juice Shop (OWASP Juice Shop v20+) — provisioned by organizer setup
  - Open alert corpus across CodeQL, Dependabot, and secret scanning for campaign scoping
tier: core
source_repo: microsoft/frontier-ghas-hackathon
source_path: Student/Challenge-S05.md
license: MIT
references:
  - https://docs.github.com/en/code-security/concepts/security-at-scale/about-security-campaigns
  - https://docs.github.com/en/code-security/how-tos/manage-security-alerts/remediate-alerts-at-scale/fixing-alerts-in-security-campaign
  - https://github.blog/changelog/2025-04-07-security-campaigns-are-now-generally-available-to-help-address-security-debt-at-scale/
  - https://docs.github.com/en/code-security/security-overview/about-security-overview
