id: ghas-05
title: Secure Secrets & Dependencies
module: ghas
track: security
difficulty: intermediate
duration_minutes: 75
prerequisites:
  - ghas-01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled on the org repo provisioned in S00
  - GitHub Copilot license assigned
  - Familiarity with Node.js environment variables and npm package management
  - Completed S01 (attack surface overview) recommended
description: >
  Respond to secret exposure and vulnerable dependencies in Juice Shop or a customer-owned
  application: remove affected values from code, assess rotation or revocation, validate safe
  replacement configuration, and record accountable remediation and time-bound exceptions
  through GHAS checks.
success_criteria:
  - Exposed secret removed from the affected code path, with revocation or rotation assessed and recorded
  - Replacement configuration uses environment variable references (process.env.VARIABLE_NAME) and the application still starts and authenticates correctly
  - At least 2 high or critical Dependabot alerts reviewed and understood
  - Pull request checks and security annotations reviewed for branch changes
  - Secret scanning alerts relevant to changes addressed or explained
  - Shared governance practice records the response owner, dependency remediation route, and any approved exception with an expiry date
  - Human- and agent-authored changes use the same push-protection, pull-request, and accountable-owner expectations
tags:
  - ghas
  - secret-scanning
  - push-protection
  - dependabot
  - dependency-review
  - juice-shop
  - secrets-management
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
  - Shared org repo with Juice Shop (OWASP Juice Shop v20+) — provisioned by organizer setup
  - Secret scanning and push protection active; Dependabot alerts pre-populated
tier: core
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghas/challenges/05-secrets-and-dependencies/meta.yml
license: MIT
references:
  - https://docs.github.com/en/code-security/secret-scanning/introduction/about-secret-scanning
  - https://docs.github.com/en/code-security/dependabot/dependabot-alerts/viewing-and-updating-dependabot-alerts
  - https://cheatsheetseries.owasp.org/cheatsheets/Secrets_Management_Cheat_Sheet.html
  - https://docs.github.com/en/code-security/dependabot/working-with-dependabot/managing-pull-requests-for-dependency-updates
