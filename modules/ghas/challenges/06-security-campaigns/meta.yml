id: ghas-06
title: Security Campaigns (Advanced)
module: ghas
track: security
difficulty: advanced
duration_minutes: 90
prerequisites:
  - ghas-01
prerequisite_capabilities:
  - Juice Shop instance running (see modules/ghas/setup.md)
  - GitHub Advanced Security enabled at organization level (Team plan or higher with Code Security license)
  - GitHub Copilot license assigned
  - Completed at least one of S02–S05 recommended (to have fixed alerts to reference)
  - Org-level Security Overview access (or ability to write a campaign plan if unavailable)
description: Establish an ongoing GHAS operating cadence for a customer-owned application or organization: prioritize accountable security debt, run a campaign or equivalent plan, govern accepted risk, measure progress, and escalate overdue risk through Security Overview evidence.
success_criteria:
  - Operating cadence documented with triage and campaign review frequency, participants, escalation, reporting path, and measures
  - Campaign scope defined and justified with risk, business impact, volume, effort, and accountable ownership
  - 'Option A: Security campaign created with name, due date, and at least 5 alerts scoped — progress tracked in the campaign view'
  - 'Option B (no org access): Shared governance practice records scope, assignees, timeline, definition of done, and tracking approach'
  - Accepted-risk and overdue findings have an accountable owner, rationale, and review or expiry date
  - Human- and agent-authored changes have the same accountable-owner, pull-request, and GHAS validation expectations
tags:
  - ghas
  - security-campaigns
  - security-overview
  - remediation
  - org-level
  - advanced
app_dependency: juice-shop
emu_compatible: true
min_environment: org
provision_creates:
  - Shared org repo with Juice Shop (OWASP Juice Shop v20+) — provisioned by organizer setup
  - Open alert corpus across CodeQL, Dependabot, and secret scanning for campaign scoping
tier: core
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghas/challenges/06-security-campaigns/meta.yml
license: MIT
references:
  - https://docs.github.com/en/code-security/concepts/security-at-scale/about-security-campaigns
  - https://docs.github.com/en/code-security/how-tos/manage-security-alerts/remediate-alerts-at-scale/fixing-alerts-in-security-campaign
  - https://github.blog/changelog/2025-04-07-security-campaigns-are-now-generally-available-to-help-address-security-debt-at-scale/
  - https://docs.github.com/en/code-security/security-overview/about-security-overview
