id: ghas-s00
title: Environment Setup
module: ghas
track: security
difficulty: beginner
duration_minutes: 25
prerequisites: []
prerequisite_capabilities:
  - GitHub account
  - Basic Git and CLI usage
  - Organization where you can create a repository and enable code security features
  - GitHub Advanced Security available for the repository visibility you choose
  - GitHub Copilot license assigned
description: >
  Provision your development environment for the GitHub Advanced Security hackathon.
  Use the provided setup scripts to import OWASP Juice Shop into an org you control,
  enable the required GHAS features, manually onboard any participants who need repo
  access, start the application on port 3000, authenticate the GitHub CLI, and create
  your working branch before Challenge S01.
success_criteria:
  - "`gh auth status` exits 0 and shows your username"
  - "`wth-ghas-s00-juice-shop` exists in your org"
  - "CodeQL, Dependabot alerts, secret scanning, and push protection are enabled or explicitly called out for manual enablement"
  - "Juice Shop is running and accessible at http://localhost:3000 (Codespace port-forwarded URL or local)"
  - "`npm start` completes without errors"
  - "Working branch created and pushed: `git push -u origin <your-branch>` succeeds"
  - "`gh repo view` returns repository metadata without error"
tags:
  - setup
  - devcontainer
  - ghas
  - juice-shop
app_dependency: juice-shop
emu_compatible: true
min_environment: org
tier: setup
source_path: docs/getting-started.html
license: MIT
references:
  - https://docs.github.com/en/codespaces/getting-started/quickstart
  - https://cli.github.com/manual/
  - https://github.com/juice-shop/juice-shop#readme
  - https://docs.github.com/en/code-security/getting-started/github-security-features
