id: ghaw-0-00
title: Challenge 00 — Environment Setup
module: ghaw
track: hello-agent
difficulty: beginner
duration_minutes: 30
prerequisites: []
prerequisite_capabilities:
  - GitHub account
  - Basic Git and CLI usage
description: >
  Provision your development environment for the GitHub Agentic Workflows hackathon.
  Open the hackathon repository in Codespaces (or a local dev container), authenticate
  the GitHub CLI, install and verify the gh-aw extension, and run a dry-run smoke test
  before Challenge 1-01.
success_criteria:
  - "`gh auth status` exits 0 and shows your username"
  - "`gh --version` returns gh >= 2.x"
  - "`gh aw --version` returns a version string"
  - "`gh aw trial modules/ghaw/resources/examples/hello-world.md --dry-run` completes without errors"
  - "`ls modules/ghaw/resources/examples/hello-world.md` confirms the embedded example exists"
tags:
  - setup
  - devcontainer
  - gh-aw
app_dependency: none
emu_compatible: true
min_environment: repo
tier: setup
source_repo: microsoft/frontier-ghaw-hackathon
source_path: _challenges/00-setup.md
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://docs.github.com/en/codespaces/getting-started/quickstart
  - https://cli.github.com/manual/
