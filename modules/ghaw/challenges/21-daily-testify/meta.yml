id: ghaw-21
title: Test Quality Improvement Pipeline
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 60
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Deploy a governed two-workflow pipeline: a test-quality expert creates actionable issues, then a test improver opens focused test-only pull requests for reviewed issues.
success_criteria:
  - `.github/workflows/daily-testify-uber-super-expert.md` exists with valid frontmatter
  - `schedule: cron` trigger is set
  - Expert persona is established in the body (specific, not generic)
  - Testify has `safe-outputs: create-issue` and creates only specific `test-improvement` issues
  - Test Improver has `safe-outputs: create-pull-request`, reads reviewed `test-improvement` issues, and changes test files only
  - Both `.lock.yml` files compile without errors
  - The workflows run in order, with Testify scheduled before Test Improver
  - A manually reviewed issue produces one syntactically valid, focused test pull request
tags:
  - testing
  - issue-creation
  - create-pull-request
  - causal-chain
  - expertise
  - test-quality
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/21-daily-testify/meta.yml
license: MIT
references:
