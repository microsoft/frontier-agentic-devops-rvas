id: ghaw-21
title: The Uber Expert (Daily Testify)
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Embed deep testing expertise in a workflow that analyses test quality daily and creates actionable issues. The first half of a causal chain that drove 13 merged PRs from 19 issues.
success_criteria:
  - `.github/workflows/daily-testify-uber-super-expert.md` exists with valid frontmatter
  - `schedule: cron` trigger is set
  - Expert persona is established in the body (specific, not generic)
  - `safe-outputs: create-issue` is declared — **no** `create-pull-request` here
  - `.lock.yml` compiles without errors
  - Manually triggered run creates at least one actionable issue
  - Issue body is specific: names a file, a function, or a concrete gap — not "add more tests"
take_home_action: In a repository you own, schedule Daily Testify to inspect test quality and create safe issues that describe concrete gaps rather than generic coverage advice.
take_home_owner: developer
take_home_signal: The repo receives actionable testing issues tied to real files, risks, and expected improvements.
tags:
  - testing
  - issue-creation
  - causal-chain
  - expertise
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/21-daily-testify/meta.yml
