id: ghaw-19
title: Daily Doc Updater
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Your docs rot silently while your code evolves. Fix that with a scheduled workflow that reviews docs against code and proposes PRs — achieving a 96% merge rate in production.
success_criteria:
  - `.github/workflows/daily-doc-updater.md` exists with valid gh-aw frontmatter
  - Trigger is `schedule: cron` (valid cron expression)
  - Target doc directory is configured to something real in your repo
  - `safe-outputs: create-pull-request` is declared
  - `.github/workflows/daily-doc-updater.lock.yml` compiles without errors
  - Dry-run produces at least one proposed doc change
  - A manually triggered run opens a real PR with a focused, accurate diff
tags:
  - documentation
  - schedule
  - create-pull-request
  - drift-detection
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/19-daily-doc-updater/meta.yml
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/githubnext/agentics/blob/main/workflows/daily-doc-updater.md
  - https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  - https://docs.github.com/en/actions/using-workflows/manually-running-a-workflow
  - https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions
