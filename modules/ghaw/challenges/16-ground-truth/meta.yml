id: ghaw-16
title: Ground Truth
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Feed your agent real data before it runs. Use pre-agent-steps: to deterministically fetch context, and create-pull-request to safely propose code changes.
success_criteria:
  - `.github/workflows/16-ground-truth.md` compiles without errors
  - `pre-agent-steps:` fetches at least 3 real metrics and writes them to `/tmp/`
  - Agent body references those `/tmp/` files explicitly
  - `CONTRIBUTING.md` is updated with a `## Project Health` section containing real numbers
  - A PR is opened — not a direct commit
  - PR title matches `title-prefix`
  - Numbers in the PR are accurate (match what `gh` CLI would return for the repo)
  - `permissions: contents: write` and `pull-requests: write` are both declared
take_home_action: In a repository you own, feed deterministic pre-agent data into a workflow before allowing it to open safe pull requests with proposed code changes.
take_home_owner: developer
take_home_signal: Generated PRs reference fetched ground-truth data and reviewers can reproduce the evidence used by the agent.
tags:
  - pre-agent-steps
  - create-pull-request
  - deterministic
  - context-injection
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/16-ground-truth/meta.yml
license: MIT
references:
  - https://github.github.com/gh-aw/reference/frontmatter/#pre-agent-steps
  - https://github.github.com/gh-aw/reference/safe-outputs-pull-requests/#create-pull-request
  - https://cli.github.com/manual/gh_api
  - https://cli.github.com/manual/gh_pr_list
