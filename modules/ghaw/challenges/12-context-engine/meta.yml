id: ghaw-12
title: Context Engine
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Supercharge your agent with external context — wire multiple MCP toolsets so it can read live PR diffs, contribution guidelines, and architecture docs before making decisions.
success_criteria:
  - Workflow triggers on PR open/push
  - Agent reads PR diff (GitHub toolset)
  - Agent reads repo files (CONTRIBUTING.md, ARCHITECTURE.md) to understand repo context
  - Agent produces a structured comment with context-aware insights
  - Comment appears on the PR
  - Comment avoids generic advice—it's specific to *this* repo's standards
  - `safe-outputs: add-comment` is used correctly
take_home_action: In a repository you own, connect the agent to live repository context through approved MCP toolsets before allowing safe comment or PR outputs.
take_home_owner: solution-architect
take_home_signal: Agent output cites current repo context such as diffs or docs and avoids decisions based on missing information.
tags:
  - mcp-tools
  - external-context
  - pr-analysis
  - context-aware
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghaw/challenges/12-context-engine/meta.yml
license: MIT
references:
