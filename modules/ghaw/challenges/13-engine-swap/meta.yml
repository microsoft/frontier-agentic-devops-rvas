id: ghaw-13
title: Engine Swap
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Discover how different AI engines produce different results — take one workflow design and adapt it for multiple engines, then compare quality, speed, and cost side by side.
success_criteria:
  - Three versions of the workflow exist (one per engine)
  - All three compile without errors (`gh aw compile` succeeds)
  - All three run at least once (visible in Actions)
  - At least one produces output on a real issue/PR/task
  - You've tested all three and collected observations
  - `RESULTS.md` documents: speed, quality, cost, and your recommendation
  - Each engine's prompt is **adapted** to that engine (not copy-paste)
take_home_action: In a repository you own, run the same safe-output workflow across candidate AI engines and choose the engine whose cost, latency, and answer quality fit production use.
take_home_owner: solution-architect
take_home_signal: Engine comparison runs produce measurable quality, speed, and cost evidence from the same real repository task.
tags:
  - multi-engine
  - prompt-portability
  - ai-comparison
  - tradeoffs
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghaw/challenges/13-engine-swap/meta.yml
license: MIT
references:
