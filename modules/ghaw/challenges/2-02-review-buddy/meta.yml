id: ghaw-2-02
title: Review Buddy
module: ghaw
track: repo-concierge
difficulty: intermediate
duration_minutes: 30
prerequisites:
  - ghaw-0-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-0-00
description: Create an automated first-pass PR reviewer that analyses diffs, spots common issues, and posts a structured comment with observations and suggestions the moment a pull request opens.
success_criteria:
  - `.github/workflows/review-buddy.md` exists with valid gh-aw frontmatter
  - Trigger is `on: pull_request: types: [opened]`
  - Safe-outputs includes `add-comment` (no label application needed here)
  - `.github/workflows/review-buddy.lock.yml` compiles without errors
  - You manually test by creating a test PR in your repo
  - The workflow runs and posts a comment within 30 seconds of PR creation
  - The comment is friendly and includes at least:
  - A thank-you message
  - Summary of changed files/lines
  - 2+ observations
  - An encouraging sign-off
  - The comment feels useful (not spam)
  - "Coach conversation — which parts of your code review are mechanical enough to delegate to a first-pass bot, and which judgment calls must always stay with a human reviewer? Talk it through with your coach and connect it to a real project, task, or workflow you own."
tags:
  - pull-requests
  - code-review
  - ai-analysis
  - comments
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_path: _challenges/2-02-review-buddy.md
license: MIT
references:
  - https://github.github.com/gh-aw/reference/permissions/
  - https://github.github.com/gh-aw/reference/safe-outputs/
  - https://docs.github.com/en/actions/learn-github-actions/contexts#github-context
  - https://github.com/githubnext/agentics/blob/main/workflows/pr-fix.md
