id: ghaw-14
title: The Overseer
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Build a meta-workflow that watches your other workflows — querying run history, calculating failure rates, and creating alert issues when something in your automation system goes wrong.
success_criteria:
  - Workflow triggers weekly (`on: schedule:`)
  - Uses `agentic-workflows` MCP tool to fetch run data
  - Frontmatter includes a concrete high token budget (for example `max-effective-tokens: 5000000`) with a comment explaining the value
  - Analysis identifies: top expensive, top failing, unexpected spikes
  - Issue created with structured data (table + alerts)
  - Old issues auto-close (via `close-older-issues: true`)
  - At least one alert or recommendation is triggered
take_home_action: In a repository you own, deploy the overseer on your workflow fleet with safe alert issues and thresholds tied to failure rate, cost, or run spikes.
take_home_owner: platform-governance
take_home_signal: The real repo gets structured automation-health alerts only when monitored thresholds are crossed.
tags:
  - meta-workflows
  - observability
  - workflow-monitoring
  - health-reporting
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/14-the-overseer/meta.yml
license: MIT
references:
  - https://github.github.com/gh-aw/reference/frontmatter/
  - https://github.github.com/gh-aw/reference/frontmatter/#max-effective-tokens
  - https://github.com/github/gh-aw/blob/main/.github/workflows/audit-workflows.md
  - https://github.com/github/gh-aw/blob/main/.github/workflows/workflow-health-manager.md
  - https://github.github.com/gh-aw/reference/safe-outputs/#create-issue
