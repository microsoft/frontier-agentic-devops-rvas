id: ghaw-17
title: Issue Triage Agent
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Deploy the 'hello world' of agentic workflows — the same issue-triage pattern used as the starter example in Claude Code. Label, categorise, and respond to new issues automatically.
success_criteria:
  - `.github/workflows/issue-triage-agent.md` exists and has valid gh-aw frontmatter
  - Trigger is `on: issues: types: [opened, reopened]`
  - `tools: github: toolsets: [issues, labels]` is present
  - `safe-outputs` includes `add-labels` and `add-comment`
  - Allowlist contains only labels that exist in your repo
  - `.github/workflows/issue-triage-agent.lock.yml` compiles without errors
  - Dry-run completes and shows expected label assignments in output
  - Live test: open a new issue and verify labels + comment appear
take_home_action: In a repository you own, deploy the issue triage agent with safe label and comment outputs for the labels and response style your maintainers accept.
take_home_owner: developer
take_home_signal: Incoming real issues are categorized consistently and maintainers can trust the comment rationale.
tags:
  - issues
  - triage
  - labels
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghaw/challenges/17-issue-triage-agent/meta.yml
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/github/gh-aw/blob/main/.github/workflows/issue-triage-agent.md
  - https://docs.github.com/en/actions/writing-workflows/workflow-syntax-for-github-actions
  - https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
  - https://docs.github.com/en/issues/using-labels-and-milestones-to-track-work/managing-labels
