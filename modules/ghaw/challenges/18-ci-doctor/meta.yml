id: ghaw-18
title: CI Doctor
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: When CI breaks, this agent investigates automatically. Pull logs, analyse root causes, and open a diagnostic issue — the workflow with a 69% merge rate in github/gh-aw.
success_criteria:
  - `.github/workflows/ci-doctor.md` exists with valid gh-aw frontmatter
  - Trigger is `on: workflow_run` scoped to at least one named workflow
  - `types: [completed]` is present and the body handles the `conclusion: failure` check
  - `safe-outputs: create-issue` is declared
  - `.github/workflows/ci-doctor.lock.yml` compiles without errors
  - Intentional CI failure causes Doctor to open a diagnostic issue
  - Issue contains: failure summary, likely root cause, suggested fix
take_home_action: In a repository you own, deploy CI Doctor with read-only log access and safe issue creation so failed runs get diagnostic follow-up without code writes.
take_home_owner: developer
take_home_signal: Failed CI runs create diagnostic issues with likely root cause, evidence links, and no unauthorized repository changes.
tags:
  - ci
  - workflow-run
  - logs
  - diagnostics
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghaw/challenges/18-ci-doctor/meta.yml
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/githubnext/agentics/blob/main/workflows/ci-doctor.md
  - https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_run
