id: ghaw-15
title: Ship It — Capstone
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 45
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Connect everything you've built into a working factory: an end-to-end agentic pipeline that takes an issue from discovery through triage, automated fix, PR creation, and merge.
success_criteria:
  - Workflow 1 (Observer) writes data to `repo-memory/observations/` with valid JSON
  - Workflow 2 (Triage) reads from repo-memory and creates a tracking issue
  - Workflow 2 includes `lock-for-agent: true` to prevent duplicates
  - Workflow 3 (ChatOps) correctly handles `/fix` slash command
  - Workflow 3 uses `assign-to-agent: copilot` (or compatible agent)
  - All workflows compile and run without errors
  - **End-to-end test**: Open an issue → Triage workflow creates tracking issue → Comment `/fix` on tracking issue → Copilot creates a PR (or attempts to)
  - At least one workflow uses `repo-memory` for data passing
  - At least one workflow uses `assign-to-agent`
take_home_action: In a repository you own, roll out the end-to-end agentic pipeline behind safe-output gates and keep the merge or release decision as an explicit human checkpoint.
take_home_owner: solution-architect
take_home_signal: A real issue moves through triage, fix proposal, and PR creation while protected branches still enforce human approval.
tags:
  - capstone
  - end-to-end
  - orchestration
  - multi-agent
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agenticdevops-hackathon
source_path: modules/ghaw/challenges/15-ship-it/meta.yml
license: MIT
