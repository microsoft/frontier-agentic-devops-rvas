id: ghaw-22
title: The Test Improver
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
  - ghaw-21
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: The consumer half of the causal chain — a daily workflow that finds coverage gaps and writes the actual tests, turning Testify's issues into merged PRs automatically.
success_criteria:
  - `.github/workflows/daily-test-improver.md` exists with valid frontmatter
  - `schedule: cron` trigger is set
  - Test framework and language are specified in the body
  - Coverage gap detection logic is in the body (not just "write more tests")
  - `safe-outputs: create-pull-request` is declared
  - `.lock.yml` compiles without errors
  - Dry-run produces at least one new test file or function
  - Proposed test is syntactically valid for your framework
  - "Coach conversation — would you trust an agent to write and open PRs for your missing tests, and how would you check that those generated tests actually prove something rather than just lifting coverage numbers? Talk it through with your coach and connect it to a real project, task, or workflow you own."
tags:
  - testing
  - coverage
  - create-pull-request
  - causal-chain
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_path: _challenges/22-test-improver.md
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/githubnext/agentics/blob/main/workflows/daily-test-improver.md
  - https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#schedule
  - https://docs.github.com/en/pull-requests/collaborating-with-pull-requests/reviewing-changes-in-pull-requests/about-pull-request-reviews
