id: ghaw-20
title: Documentation Unbloat
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Bloated docs scare contributors away. Deploy a workflow that identifies verbose, redundant, or outdated documentation and trims it — 85% of its PRs merge straight to main.
success_criteria:
  - `.github/workflows/unbloat-docs.md` exists with valid gh-aw frontmatter
  - Target document is explicitly named in the workflow body
  - `safe-outputs: create-pull-request` is declared
  - Simplification criteria are specific, not vague ("make it shorter" is too vague — "remove duplicate warnings and shorten code examples to one line" is good)
  - `.github/workflows/unbloat-docs.lock.yml` compiles without errors
  - Dry-run proposes at least one real simplification
  - Proposed PR diff is focused (one file, clean changes)
take_home_action: In a repository you own, run the documentation unbloat workflow on one docs area and require safe pull requests with small, reviewable deletions.
take_home_owner: developer
take_home_signal: A real PR removes redundant documentation while preserving required guidance and passing normal review.
tags:
  - documentation
  - simplification
  - create-pull-request
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/20-doc-unbloat/meta.yml
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/githubnext/agentics/blob/main/workflows/unbloat-docs.md
  - https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#workflow_dispatch
  - https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions
