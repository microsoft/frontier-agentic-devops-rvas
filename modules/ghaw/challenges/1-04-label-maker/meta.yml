id: ghaw-1-04
title: Label Maker
module: ghaw
track: hello-agent
difficulty: beginner
duration_minutes: 30
prerequisites:
  - ghaw-0-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-0-00
description: Wire up an issue-events trigger so the AI agent reads every new issue's title and body, classifies it automatically, and applies the right label from a defined allowlist.
success_criteria:
  - Workflow file `.github/workflows/label-maker.md` exists
  - Frontmatter includes `on: issues: types: [opened]`
  - Safe-outputs includes `add-labels:` with an allowlist of 3-5 label names
  - Permissions are scoped minimally (e.g., `contents: read`)
  - `.github/workflows/label-maker.lock.yml` exists after compilation
  - When you open a new issue with clear content (e.g., "Bug: login button not working"), the workflow runs
  - The agent correctly classifies the issue and applies the appropriate label
  - Multiple issues are tested with different classifications
  - Logs show the agent's reasoning (e.g., "This is a bug because...")
tags:
  - issue-events
  - ai-classification
  - labels
  - automation
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-ghaw-hackathon
source_path: _challenges/1-04-label-maker.md
license: MIT
references:
  - https://github.github.com/gh-aw/reference/triggers/#issues
  - https://github.github.com/gh-aw/reference/safe-outputs/#add-labels
  - https://github.github.com/gh-aw/reference/safe-outputs/#labels
  - https://github.github.com/gh-aw/reference/tools/github/#issues
  - https://github.github.com/gh-aw/blog/2026-01-13-meet-the-workflows-issue-management/
