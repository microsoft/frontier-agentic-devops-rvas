id: ghaw-2-01
title: Triage Bot
module: ghaw
track: repo-concierge
difficulty: intermediate
duration_minutes: 30
prerequisites:
  - ghaw-0-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-0-00
description: Build an event-driven workflow that categorises every new issue with an AI label and posts a friendly comment explaining the classification and next steps.
success_criteria:
  - `.github/workflows/triage-bot.md` exists with valid gh-aw frontmatter
  - Frontmatter includes: `on: issues:`, `permissions`, `safe-outputs:`, `engines`
  - Safe-outputs has an allowlist limiting labels to: `bug`, `feature-request`, `documentation`, `question`, `duplicate`
  - `.github/workflows/triage-bot.lock.yml` compiles without errors
  - You manually test by creating a test issue in your repo
  - The workflow triggers automatically (watch the Actions tab)
  - The correct label appears on the test issue
  - A comment is posted with the category and explanation
  - The comment is friendly and encouraging (not robotic)
tags:
  - issue-triage
  - event-triggers
  - ai-classification
  - labels
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_repo: microsoft/frontier-ghaw-hackathon
source_path: _challenges/2-01-triage-bot.md
license: MIT
references:
  - https://github.github.com/gh-aw/reference/frontmatter/
  - https://github.github.com/gh-aw/reference/safe-outputs/
  - https://github.github.com/gh-aw/reference/tools/github/
  - https://github.com/github/gh-aw/blob/main/.github/workflows/issue-triage-agent.md
