id: ghaw-3-02
title: Context Engine
module: ghaw
track: continuous-intelligence
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-0-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-0-00
description: Supercharge your agent with external context — wire multiple MCP toolsets so it can read live PR diffs, contribution guidelines, and architecture docs before making decisions.
success_criteria:
  - Workflow triggers on PR open/push
  - Agent reads PR diff (GitHub toolset)
  - Agent reads repo files (CONTRIBUTING.md, ARCHITECTURE.md) to understand repo context
  - Agent produces a structured comment with context-aware insights
  - Comment appears on the PR
  - Comment avoids generic advice—it's specific to *this* repo's standards
  - `safe-outputs: add-comment` is used correctly
  - "Coach conversation — what context does an agent on your team need before it can make a decision you would trust, and where today does it fly blind without that data? Talk it through with your coach and connect it to a real project, task, or workflow you own."
tags:
  - mcp-tools
  - external-context
  - pr-analysis
  - context-aware
app_dependency: none
emu_compatible: true
min_environment: repo
tier: core
source_path: _challenges/3-02-context-engine.md
