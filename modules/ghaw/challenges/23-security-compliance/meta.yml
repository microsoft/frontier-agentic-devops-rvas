id: ghaw-23
title: Security Compliance
module: ghaw
track: production-patterns
difficulty: advanced
duration_minutes: 30
prerequisites:
  - ghaw-00
prerequisite_capabilities:
  - GitHub Actions basics
  - YAML syntax
  - gh-aw CLI installed — see ghaw-00
description: Run vulnerability campaigns on a schedule — tracking CVEs by severity, enforcing SLA windows, and opening deadline-aware issues before vulnerabilities slip through the cracks.
success_criteria:
  - `.github/workflows/security-compliance.md` exists with valid frontmatter
  - `schedule: cron` trigger is set
  - SLA windows are defined in the body (severity → days)
  - `safe-outputs: create-issue` is declared
  - `.lock.yml` compiles without errors
  - Manually triggered run either: opens issues for real alerts, or reports "no violations found" clearly
  - Issues (if opened) include: CVE/advisory ID, severity, days remaining, package name
tags:
  - security
  - compliance
  - schedule
  - sla
  - production
app_dependency: none
emu_compatible: true
min_environment: repo
tier: stretch
source_repo: microsoft/frontier-agentic-devops-rvas
source_path: modules/ghaw/challenges/23-security-compliance/meta.yml
license: MIT
references:
  - https://github.com/github/gh-aw
  - https://github.com/github/gh-aw/blob/main/.github/workflows/security-compliance.md
  - https://docs.github.com/en/code-security/dependabot/dependabot-alerts/about-dependabot-alerts
  - https://docs.github.com/en/code-security/security-advisories/working-with-global-security-advisories-from-the-github-advisory-database/about-the-github-advisory-database
  - https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication
